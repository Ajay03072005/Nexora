<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Schedule - AlumniHub</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/alumni.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h1>AlumniHub</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
                <li><a href="requests.html" class="nav-link">Requests</a></li>
                <li><a href="schedules.html" class="nav-link active">Schedules</a></li>
                <li><a href="jobs.html" class="nav-link">Jobs</a></li>
                <li><a href="network.html" class="nav-link">Network</a></li>
            </ul>
            <div class="nav-user">
                <span class="user-role">🎓 Alumni</span>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Your Schedule 📋</h1>
            <p>Manage one-on-one sessions, submit reports, and host calls inside the portal</p>
        </div>
    </section>

    <section class="page-section">
        <h2>Accepted One-on-One Sessions</h2>
        <div id="alumniSessionList" style="display:grid;gap:1rem;">
            <div class="history-item">Loading sessions...</div>
        </div>
    </section>

    <div id="videoPortalModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:99999;padding:1rem;">
        <div style="background:#fff;border-radius:8px;max-width:1100px;height:90vh;margin:0 auto;display:flex;flex-direction:column;">
            <div style="padding:0.75rem 1rem;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;">
                <h3 id="videoPortalTitle" style="margin:0;">Portal Video Call</h3>
                <button onclick="closePortalVideo()" class="btn-outline-small">Close</button>
            </div>
            <iframe id="videoPortalFrame" title="Portal Video Call" style="flex:1;border:none;" allow="camera; microphone; fullscreen; display-capture; autoplay"></iframe>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2026 AlumniHub. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="../assets/js/api-service.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/alumni-schedules.js"></script>
    <script>
        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = '../login.html';
        }
    </script>
</body>
</html>
