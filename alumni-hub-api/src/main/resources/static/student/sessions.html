<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Sessions - AlumniHub</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/student.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h1>AlumniHub</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
                <li><a href="jobs.html" class="nav-link">Jobs</a></li>
                <li><a href="events.html" class="nav-link">Events</a></li>
                <li><a href="directory.html" class="nav-link">Directory</a></li>
                <li><a href="sessions.html" class="nav-link active">Sessions</a></li>
            </ul>
            <div class="nav-user">
                <span class="user-role">👨‍🎓 Student</span>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>My Mentoring Sessions 🎓</h1>
            <p>Track your mentoring sessions and progress with alumni mentors</p>
        </div>
    </section>

    <!-- Session Tabs -->
    <section class="page-section">
        <div class="session-tabs">
            <button class="tab-btn active" onclick="switchTab('upcoming')">Accepted Sessions</button>
            <button class="tab-btn" onclick="switchTab('completed')">Reports</button>
        </div>

        <!-- Upcoming Sessions -->
        <div id="upcoming" class="tab-content active">
            <div class="session-requests-grid" id="upcomingList">
                <div class="session-card-full">Loading accepted sessions...</div>
            </div>
        </div>

        <!-- Completed Sessions -->
        <div id="completed" class="tab-content" style="display: none;">
            <div class="applications-list" id="completedList">
                <div class="application-item"><h3>Loading reports...</h3></div>
            </div>
        </div>
    </section>

    <div id="studentVideoPortalModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:99999;padding:1rem;">
        <div style="background:#fff;border-radius:8px;max-width:1100px;height:90vh;margin:0 auto;display:flex;flex-direction:column;">
            <div style="padding:0.75rem 1rem;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;">
                <h3 id="studentVideoPortalTitle" style="margin:0;">Portal Video Call</h3>
                <button onclick="closeStudentPortalVideo()" class="btn-outline-small">Close</button>
            </div>
            <iframe id="studentVideoPortalFrame" title="Portal Video Call" style="flex:1;border:none;" allow="camera; microphone; fullscreen; display-capture; autoplay"></iframe>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2026 AlumniHub. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="../assets/js/api-service.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/student-sessions.js"></script>
    <script>
        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = '../login.html';
        }

        function switchTab(tabName) {
            const contents = document.querySelectorAll('.tab-content');
            const buttons = document.querySelectorAll('.tab-btn');
            
            contents.forEach(content => content.classList.remove('active'));
            buttons.forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
